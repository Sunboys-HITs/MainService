name: Deploy Main Service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/sunboys-hits/main-service
  DEPLOYMENT_NAME: main-service
  NAMESPACE: app
  RABBITMQ_USERNAME: sunboys_app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./MainService.Api
          file: ./MainService.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          test -n "$KUBECONFIG_B64" || {
            echo 'KUBECONFIG_B64 GitHub Actions secret is not configured' >&2
            exit 1
          }
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace exists
        run: kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure RabbitMQ connection
        env:
          RABBITMQ_PASSWORD: ${{ secrets.MAIN_SERVICE_RABBITMQ_PASSWORD || 'sunboys_app_password' }}
        run: |
          kubectl -n "$NAMESPACE" create secret generic main-service-rabbitmq \
            --from-literal=username="$RABBITMQ_USERNAME" \
            --from-literal=password="$RABBITMQ_PASSWORD" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Configure database connection
        env:
          MAIN_DB_PASSWORD: ${{ secrets.MAIN_DB_PASSWORD }}
        run: |
          test -n "$MAIN_DB_PASSWORD" || {
            echo 'MAIN_DB_PASSWORD GitHub Actions secret is not configured' >&2
            exit 1
          }
          kubectl -n "$NAMESPACE" create secret generic main-database \
            --from-literal=connection-string="Host=main-postgres.infra.svc.cluster.local;Port=5432;Database=main_service;Username=main_service;Password=$MAIN_DB_PASSWORD" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/main-service.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT_NAME" --timeout=180s

      - name: Show service
        if: always()
        run: kubectl -n "$NAMESPACE" get deployment,service,endpoints,ingress "$DEPLOYMENT_NAME" -o wide
